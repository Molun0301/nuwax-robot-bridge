version: "3.9"

services:
  nuwaclaw:
    image: your-nuwaclaw-image:latest
    container_name: nuwaclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NUWAX_EMBODIMENT_MCP_URL: "http://host.docker.internal:8766/mcp"
      NUWAX_EMBODIMENT_API_URL: "http://host.docker.internal:8766/api"
      NUWAX_EMBODIMENT_EVENTS_WS_URL: "ws://host.docker.internal:8766/events/ws"
      NUWAX_EMBODIMENT_EVENTS_SSE_URL: "http://host.docker.internal:8766/events/stream"
      NUWAX_EMBODIMENT_TOKEN: "${NUWAX_GATEWAY_AGENT_TOKEN}"
    restart: unless-stopped

  # 可选：当容器内只方便访问本地地址时，再启用 relay。
  nuwax-relay:
    image: python:3.12-slim
    container_name: nuwax-relay
    working_dir: /workspace/nuwax_robot_bridge
    volumes:
      - ../:/workspace/nuwax_robot_bridge:ro
    command:
      - python
      - -m
      - uvicorn
      - gateways.app:create_relay_app_from_env
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "9766"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NUWAX_RELAY_ENABLED: "true"
      NUWAX_RELAY_HOST: "0.0.0.0"
      NUWAX_RELAY_PORT: "9766"
      NUWAX_RELAY_UPSTREAM_BASE_URL: "http://host.docker.internal:8766"
      NUWAX_RELAY_INCOMING_TOKENS: "${NUWAX_RELAY_TOKEN}"
      NUWAX_RELAY_UPSTREAM_TOKEN: "${NUWAX_GATEWAY_AGENT_TOKEN}"
    restart: unless-stopped
